<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Life & Health | Donohoo & Sons</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:400,500,600&family=Playfair+Display:500,600,700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#faf9f6;
  --ink:#1a1a1a;
  --muted:#6e6e73;
  --navy:#0f1c3a;
  --line:rgba(0,0,0,.08);
  --paper:#f4f3f0;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  opacity: 0;
  transition: opacity 0.5s ease;
}

body.nav-open { overflow: hidden; }

.wrap{max-width:1150px;margin:auto;padding:70px 18px}

/* HEADER */
.topbar{
  border-bottom:1px solid var(--line);
  padding:12px 0;
  background:rgba(250, 249, 246, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position:sticky;
  top:0;
  z-index:2000;
}
.nav{max-width:1050px;margin:auto;padding:0 18px;display:flex;justify-content:space-between;align-items:center}
.logo-img{height:28px}

.hamburger { cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 40px; height: 40px; z-index: 2100; }
.hamburger span { display: block; width: 18px; height: 1.5px; background-color: var(--ink); transition: 0.4s; }
.hamburger span:nth-child(1) { transform: translateY(-3px); }
.hamburger span:nth-child(2) { transform: translateY(3px); }
.hamburger.active span:nth-child(1) { transform: translateY(0.5px) rotate(45deg); }
.hamburger.active span:nth-child(2) { transform: translateY(-0.5px) rotate(-45deg); }

.nav-menu { position: fixed; top: 0; left: 0; width: 100%; height: 0; background: var(--bg); z-index: 1500; overflow: hidden; display: flex; flex-direction: column; padding-top: 80px; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
.nav-menu.active { height: 100vh; }
.nav-links { padding: 0 40px; display: flex; flex-direction: column; }
.nav-menu a { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 600; color: var(--ink); text-decoration: none; margin-bottom: 24px; opacity: 0; transform: translateY(10px); transition: 0.4s ease; }
.nav-menu.active a { opacity: 1; transform: translateY(0); }

/* REVEAL ANIMATIONS */
.reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* HERO */
.hero{text-align:center;margin-bottom:80px}
h1{font-family:'Playfair Display';font-size:clamp(40px,7vw,64px);line-height:1.05;margin-bottom:20px}
.sub{color:var(--muted);font-size:20px;max-width:700px;margin:auto;line-height:1.6}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:25px;margin:80px 0}
.card{
  background:#fff;
  padding:50px 35px;
  border-radius:28px;
  border: 1px solid var(--line);
  transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
}
.card:hover { transform: translateY(-8px); border-color: var(--navy); box-shadow: 0 20px 40px rgba(15,28,58,0.06); }
.card h3{font-family:'Playfair Display';font-size:26px;margin-bottom:15px;color:var(--navy)}
.card p{color:var(--muted);line-height:1.7;font-size:16px;margin:0}

/* ABOUT SECTION */
.about-spread{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin:100px 0; text-align: left;}
.about-spread h2{font-family:'Playfair Display';font-size:42px;margin-bottom:25px}
.about-spread p{color:var(--muted);line-height:1.8;font-size:18px}
.fishing-photo{width:100%; aspect-ratio: 4/5; object-fit: cover; border-radius:30px;box-shadow:0 20px 45px rgba(0,0,0,.05)}

/* INTERACTIVE AUDIT BOX */
.audit-box { background: var(--navy); color: #fff; padding: 100px 40px; border-radius: 40px; text-align: center; margin-top: 100px; }
.audit-box h2 { font-family:'Playfair Display'; font-size: clamp(32px, 5vw, 48px); margin:0; }

/* The Toggle Switch */
.audit-toggle-wrapper { display: flex; justify-content: center; margin: 40px 0 50px; }
.audit-toggle { background: rgba(255,255,255,0.08); padding: 6px; border-radius: 100px; display: inline-flex; border: 1px solid rgba(255,255,255,0.15); }
.toggle-btn { background: transparent; border: none; color: #fff; padding: 14px 35px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; border-radius: 100px; cursor: pointer; transition: 0.3s; opacity: 0.7; }
.toggle-btn.active { background: #fff; color: var(--navy); opacity: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

/* The Content Areas */
.audit-content { display: none; animation: fadeIn 0.4s ease forwards; }
.audit-content.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.audit-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; text-align: left; }
.audit-item h4 { color: #fff; margin: 0 0 15px 0; font-size: 21px; font-family: 'Playfair Display'; }
.audit-item p { font-size: 15px; opacity: 0.8; line-height: 1.7; margin: 0; }

/* BUTTON */
.btn-white{
  display:inline-block;
  padding:22px 50px;
  background:#fff;
  color:var(--navy);
  border-radius:100px;
  font-weight:600;
  text-decoration:none;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-size: 13px;
  margin-top:60px;
  transition:.3s ease;
}
.btn-white:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

footer{text-align:center;margin-top:80px;padding-bottom:40px;font-size:12px;color:var(--muted);letter-spacing:1px}

@media(max-width:900px){ 
  .about-spread, .card-grid, .audit-grid { grid-template-columns: 1fr; text-align:center} 
  .audit-item { text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 30px; }
  .audit-item:last-child { border-bottom: none; padding-bottom: 0; }
  .hero { margin-bottom: 40px; }
  .toggle-btn { padding: 12px 20px; font-size: 14px; }
}
</style>
</head>

      <span></span>

</div>

</nav>

<div class="wrap">
