<style>
    :root {
      --bg: #fdfdfb; /* Slightly off-white for a premium "paper" feel */
      --ink: #1a202c;
      --navy: #002244;

      --line: #e2e8f0;
      --paper: #f1f5f9;
    }

    /* UNIQUE HEADER TWEAK */
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--accent); /* Thin gold line for personality */
    }

    /* THE HERO "BOUTIQUE" LOOK */
    .hero {
      background: linear-gradient(rgba(0,34,68,0.8), rgba(0,34,68,0.9)), url('boys.jpg');
      padding: 180px 0 140px;
    }
    
    .hero h1 {
      font-family: 'Playfair Display', serif;
      letter-spacing: -1px;
    }

    /* PILLARS WITH CHARACTER */
    .pillar {
      background: white;
      border: 1px solid var(--line);
      border-bottom: 4px solid var(--accent); /* Bottom accent bar */
      transition: transform 0.3s ease;
    }
    
    .pillar:hover {
      transform: translateY(-10px);
    }

    .pillar i {
      color: var(--navy); /* Navy icons feel more grounded than blue ones */
    }

    /* ADDING A "PERSONAL GUARANTEE" SECTION */
    .guarantee-box {
        border: 2px dashed var(--accent);

        background: #fffcf5;
        border-radius: 8px;
